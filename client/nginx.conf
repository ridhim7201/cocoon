server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: any unmatched path falls back to index.html
    # so client-side routing (if added later) doesn't 404 on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed Vite build assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
